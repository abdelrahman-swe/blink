<svg width="215" height="178" viewBox="0 0 215 178" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      /* Keyframe animations for smooth assembly */
      @keyframes cartCollect {
        0% { transform: translateY(22px) scale(0.9); opacity: 0; }
        40% { transform: translateY(5px) scale(0.97); opacity: 0.7; }
        100% { transform: translateY(0) scale(1); opacity: 1; }
      }
      @keyframes topRailSlide {
        0% { transform: translateX(-35px) scaleX(0.55); opacity: 0; }
        50% { transform: translateX(-5px) scaleX(0.94); opacity: 0.8; }
        100% { transform: translateX(0) scaleX(1); opacity: 1; }
      }
      @keyframes leftArmFly {
        0% { transform: translate(-38px, 28px) rotate(-22deg); opacity: 0; }
        45% { transform: translate(-10px, 6px) rotate(-6deg); opacity: 0.7; }
        100% { transform: translate(0, 0) rotate(0deg); opacity: 1; }
      }
      @keyframes rightArmFly {
        0% { transform: translate(42px, 26px) rotate(24deg); opacity: 0; }
        45% { transform: translate(10px, 6px) rotate(5deg); opacity: 0.7; }
        100% { transform: translate(0, 0) rotate(0deg); opacity: 1; }
      }
      @keyframes verticalBarDrop {
        0% { transform: translateY(-48px) scaleY(0.15); opacity: 0; }
        60% { transform: translateY(-10px) scaleY(0.92); opacity: 0.85; }
        100% { transform: translateY(0) scaleY(1); opacity: 1; }
      }
      @keyframes wheelSpinIn {
        0% { transform: translate(55px, 45px) rotate(-75deg) scale(0.2); opacity: 0; }
        50% { transform: translate(15px, 12px) rotate(-18deg) scale(0.65); opacity: 0.7; }
        100% { transform: translate(0, 0) rotate(0deg) scale(1); opacity: 1; }
      }
      @keyframes wheelInnerSpin {
        0% { transform: translate(60px, 50px) rotate(-85deg) scale(0.15); opacity: 0; }
        55% { transform: translate(18px, 14px) rotate(-22deg) scale(0.6); opacity: 0.75; }
        100% { transform: translate(0, 0) rotate(0deg) scale(1); opacity: 1; }
      }
      @keyframes wheelDetailSpin {
        0% { transform: translate(65px, 55px) rotate(-95deg) scale(0.1); opacity: 0; }
        60% { transform: translate(20px, 16px) rotate(-28deg) scale(0.55); opacity: 0.75; }
        100% { transform: translate(0, 0) rotate(0deg) scale(1); opacity: 1; }
      }
      @keyframes wheelSpokeSpin {
        0% { transform: translate(70px, 60px) rotate(-110deg) scale(0.08); opacity: 0; }
        65% { transform: translate(22px, 18px) rotate(-32deg) scale(0.5); opacity: 0.8; }
        100% { transform: translate(0, 0) rotate(0deg) scale(1); opacity: 1; }
      }
      @keyframes leftWheelParts {
        0% { transform: translate(-32px, 30px) scale(0.45) rotate(-15deg); opacity: 0; }
        50% { transform: translate(-10px, 8px) scale(0.82) rotate(-4deg); opacity: 0.8; }
        100% { transform: translate(0, 0) scale(1) rotate(0deg); opacity: 1; }
      }
      @keyframes rightWheelParts {
        0% { transform: translate(38px, 32px) scale(0.4) rotate(18deg); opacity: 0; }
        50% { transform: translate(12px, 8px) scale(0.82) rotate(5deg); opacity: 0.8; }
        100% { transform: translate(0, 0) scale(1) rotate(0deg); opacity: 1; }
      }
      @keyframes cartBounce {
        0%, 100% { transform: translateY(0); }
        85% { transform: translateY(-4px); }
        92% { transform: translateY(1.5px); }
      }
      @keyframes shadowFadeIn {
        0% { opacity: 0; transform: scale(0.7); }
        100% { opacity: 0.1; transform: scale(1); }
      }
      @keyframes bgGlow {
        0% { opacity: 0; }
        100% { opacity: 0.1; }
      }
      /* Apply animations */
      #cartBody { animation: cartCollect 0.68s cubic-bezier(0.34, 1.2, 0.64, 1) forwards, cartBounce 0.42s ease-out 0.72s forwards; }
      #topRail { animation: topRailSlide 0.6s cubic-bezier(0.25, 1.1, 0.5, 1) 0.05s forwards; }
      #topRailStroke { animation: topRailSlide 0.6s cubic-bezier(0.25, 1.1, 0.5, 1) 0.05s forwards; }
      #leftArm { animation: leftArmFly 0.62s cubic-bezier(0.3, 1.2, 0.5, 1) 0.1s forwards; }
      #leftArmDetail { animation: leftArmFly 0.62s cubic-bezier(0.3, 1.2, 0.5, 1) 0.12s forwards; }
      #leftWheelCap { animation: leftWheelParts 0.58s cubic-bezier(0.4, 1.2, 0.5, 1) 0.18s forwards; }
      #leftWheelDetail { animation: leftWheelParts 0.58s cubic-bezier(0.4, 1.2, 0.5, 1) 0.2s forwards; }
      #rightArm { animation: rightArmFly 0.62s cubic-bezier(0.3, 1.2, 0.5, 1) 0.1s forwards; }
      #rightArmDetail { animation: rightArmFly 0.62s cubic-bezier(0.3, 1.2, 0.5, 1) 0.12s forwards; }
      #rightWheelCap { animation: rightWheelParts 0.58s cubic-bezier(0.4, 1.2, 0.5, 1) 0.18s forwards; }
      #rightWheelDetail { animation: rightWheelParts 0.58s cubic-bezier(0.4, 1.2, 0.5, 1) 0.2s forwards; }
      #verticalBarLeft { animation: verticalBarDrop 0.64s cubic-bezier(0.33, 1.15, 0.5, 1) 0.08s forwards; }
      #verticalBarMid { animation: verticalBarDrop 0.64s cubic-bezier(0.33, 1.15, 0.5, 1) 0.1s forwards; }
      #verticalBarRight { animation: verticalBarDrop 0.64s cubic-bezier(0.33, 1.15, 0.5, 1) 0.12s forwards; }
      #wheelOuter { animation: wheelSpinIn 0.72s cubic-bezier(0.28, 1.25, 0.4, 1) 0.15s forwards; }
      #wheelInner { animation: wheelInnerSpin 0.7s cubic-bezier(0.28, 1.25, 0.4, 1) 0.18s forwards; }
      #wheelDetailStroke { animation: wheelDetailSpin 0.68s cubic-bezier(0.28, 1.25, 0.4, 1) 0.2s forwards; }
      #wheelSpoke { animation: wheelSpokeSpin 0.66s cubic-bezier(0.28, 1.25, 0.4, 1) 0.22s forwards; }
      #bgShadow { animation: shadowFadeIn 0.9s ease-out 0.3s forwards; }
      #bgGlowPath { animation: bgGlow 0.7s ease-out forwards; }
    </style>
    <clipPath id="clip0_1518_6068">
      <rect width="215" height="178" fill="white"/>
    </clipPath>
  </defs>

