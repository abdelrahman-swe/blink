<svg width="159" height="139" viewBox="0 0 159 139" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Smooth easing for assembly motions -->
    <style>
      @keyframes cartCollect {
        0% {
          transform: translateY(18px) scale(0.92);
          opacity: 0.4;
        }
        40% {
          transform: translateY(4px) scale(0.98);
          opacity: 0.9;
        }
        100% {
          transform: translateY(0) scale(1);
          opacity: 1;
        }
      }
      @keyframes topRailSlide {
        0% {
          transform: translateX(-30px) scaleX(0.6);
          opacity: 0.3;
        }
        50% {
          transform: translateX(-5px) scaleX(0.95);
          opacity: 0.9;
        }
        100% {
          transform: translateX(0) scaleX(1);
          opacity: 1;
        }
      }
      @keyframes leftArmFly {
        0% {
          transform: translate(-32px, 24px) rotate(-18deg);
          opacity: 0;
        }
        45% {
          transform: translate(-8px, 6px) rotate(-5deg);
          opacity: 0.8;
        }
        100% {
          transform: translate(0, 0) rotate(0deg);
          opacity: 1;
        }
      }
      @keyframes rightArmFly {
        0% {
          transform: translate(38px, 22px) rotate(20deg);
          opacity: 0;
        }
        45% {
          transform: translate(8px, 6px) rotate(4deg);
          opacity: 0.8;
        }
        100% {
          transform: translate(0, 0) rotate(0deg);
          opacity: 1;
        }
      }
      @keyframes verticalBarDrop {
        0% {
          transform: translateY(-42px) scaleY(0.2);
          opacity: 0;
        }
        60% {
          transform: translateY(-8px) scaleY(0.95);
          opacity: 0.9;
        }
        100% {
          transform: translateY(0) scaleY(1);
          opacity: 1;
        }
      }
      @keyframes wheelSpinIn {
        0% {
          transform: translate(48px, 38px) rotate(-70deg) scale(0.25);
          opacity: 0;
        }
        50% {
          transform: translate(12px, 12px) rotate(-15deg) scale(0.7);
          opacity: 0.7;
        }
        100% {
          transform: translate(0, 0) rotate(0deg) scale(1);
          opacity: 1;
        }
      }
      @keyframes wheelInnerSpin {
        0% {
          transform: translate(52px, 42px) rotate(-80deg) scale(0.2);
          opacity: 0;
        }
        55% {
          transform: translate(14px, 14px) rotate(-20deg) scale(0.65);
          opacity: 0.8;
        }
        100% {
          transform: translate(0, 0) rotate(0deg) scale(1);
          opacity: 1;
        }
      }
      @keyframes wheelDetailSpin {
        0% {
          transform: translate(56px, 46px) rotate(-90deg) scale(0.15);
          opacity: 0;
        }
        60% {
          transform: translate(16px, 16px) rotate(-25deg) scale(0.6);
          opacity: 0.8;
        }
        100% {
          transform: translate(0, 0) rotate(0deg) scale(1);
          opacity: 1;
        }
      }
      @keyframes wheelSpokeSpin {
        0% {
          transform: translate(60px, 50px) rotate(-100deg) scale(0.1);
          opacity: 0;
        }
        65% {
          transform: translate(18px, 18px) rotate(-30deg) scale(0.5);
          opacity: 0.8;
        }
        100% {
          transform: translate(0, 0) rotate(0deg) scale(1);
          opacity: 1;
        }
      }
      @keyframes leftWheelParts {
        0% {
          transform: translate(-28px, 26px) scale(0.5) rotate(-12deg);
          opacity: 0;
        }
        50% {
          transform: translate(-8px, 8px) scale(0.85) rotate(-3deg);
          opacity: 0.8;
        }
        100% {
          transform: translate(0, 0) scale(1) rotate(0deg);
          opacity: 1;
        }
      }
      @keyframes rightWheelParts {
        0% {
          transform: translate(32px, 28px) scale(0.45) rotate(15deg);
          opacity: 0;
        }
        50% {
          transform: translate(10px, 8px) scale(0.85) rotate(4deg);
          opacity: 0.8;
        }
        100% {
          transform: translate(0, 0) scale(1) rotate(0deg);
          opacity: 1;
        }
      }
      @keyframes cartBounce {
        0%, 100% { transform: translateY(0); }
        85% { transform: translateY(-3px); }
        92% { transform: translateY(1px); }
      }
      /* Apply animations to each part */
      #cartBody { animation: cartCollect 0.65s cubic-bezier(0.34, 1.2, 0.64, 1) forwards, cartBounce 0.4s ease-out 0.68s forwards; }
      #topRail { animation: topRailSlide 0.58s cubic-bezier(0.25, 1.1, 0.5, 1) 0.05s forwards; }
      #topRailStroke { animation: topRailSlide 0.58s cubic-bezier(0.25, 1.1, 0.5, 1) 0.05s forwards; }
      #leftArm { animation: leftArmFly 0.6s cubic-bezier(0.3, 1.2, 0.5, 1) 0.1s forwards; }
      #leftArmDetail { animation: leftArmFly 0.6s cubic-bezier(0.3, 1.2, 0.5, 1) 0.12s forwards; }
      #leftWheelCap { animation: leftWheelParts 0.55s cubic-bezier(0.4, 1.2, 0.5, 1) 0.18s forwards; }
      #leftWheelDetail { animation: leftWheelParts 0.55s cubic-bezier(0.4, 1.2, 0.5, 1) 0.2s forwards; }
      #rightArm { animation: rightArmFly 0.6s cubic-bezier(0.3, 1.2, 0.5, 1) 0.1s forwards; }
      #rightArmDetail { animation: rightArmFly 0.6s cubic-bezier(0.3, 1.2, 0.5, 1) 0.12s forwards; }
      #rightWheelCap { animation: rightWheelParts 0.55s cubic-bezier(0.4, 1.2, 0.5, 1) 0.18s forwards; }
      #rightWheelDetail { animation: rightWheelParts 0.55s cubic-bezier(0.4, 1.2, 0.5, 1) 0.2s forwards; }
      #verticalBarLeft { animation: verticalBarDrop 0.62s cubic-bezier(0.33, 1.15, 0.5, 1) 0.08s forwards; }
      #verticalBarMid { animation: verticalBarDrop 0.62s cubic-bezier(0.33, 1.15, 0.5, 1) 0.1s forwards; }
      #verticalBarRight { animation: verticalBarDrop 0.62s cubic-bezier(0.33, 1.15, 0.5, 1) 0.12s forwards; }
      #wheelOuter { animation: wheelSpinIn 0.7s cubic-bezier(0.28, 1.25, 0.4, 1) 0.15s forwards; }
      #wheelInner { animation: wheelInnerSpin 0.68s cubic-bezier(0.28, 1.25, 0.4, 1) 0.18s forwards; }
      #wheelDetailStroke { animation: wheelDetailSpin 0.66s cubic-bezier(0.28, 1.25, 0.4, 1) 0.2s forwards; }
      #wheelSpoke { animation: wheelSpokeSpin 0.64s cubic-bezier(0.28, 1.25, 0.4, 1) 0.22s forwards; }
    </style>
  </defs>

