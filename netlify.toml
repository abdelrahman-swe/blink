[build]
  command = "npm run build"
  publish = ".next"

# ─── Cache-Control Strategy ─────────────────────────────────────────────────
#
# The "Failed to load chunk" error happens when the browser has cached an HTML
# page that still references old chunk hashes from a previous deployment.
# After a new deploy those old chunks no longer exist on Netlify's CDN.
#
# Fix:
#   - HTML pages  → never cache  (browser always fetches fresh HTML with the
#                                  correct new chunk references after a deploy)
#   - JS/CSS/fonts → cache forever (safe: filenames include a content hash,
#                                   so a new deploy = new filename = cache miss)
# ─────────────────────────────────────────────────────────────────────────────

# HTML pages — must revalidate on every request
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Hashed JS/CSS chunks — safe to cache permanently
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Static public assets (images, fonts, icons, etc.)
[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.ico"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
