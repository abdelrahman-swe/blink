name: Sync to Deploy Remote

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to Deploy Remote
        env:
          TARGET_REPO: https://${{ secrets.DEPLOY_REPO_PAT }}@github.com/abdelrahman-swe/blink.git
        run: |
          git remote add deploy $TARGET_REPO
          
          # Try to push without force first
          if git push deploy main; then
            echo "✅ Successfully synced to deploy remote"
          else
            echo "⚠️ Normal push failed, attempting with --force-with-lease"
            if git push deploy main --force-with-lease; then
              echo "✅ Synced with force-with-lease"
            else
              echo "❌ Failed to sync to deploy remote"
              # Don't fail the workflow - original push already succeeded
              exit 0
            fi
          fi