name: Sync to Deploy Remote

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to deploy repo
        env:
          # IMPORTANT: This MUST match the secret name you created
          TOKEN: ${{ secrets.DEPLOY_REPO_PAT }}
        run: |
          git remote add deploy https://${TOKEN}@github.com/abdelrahman-swe/blink.git
          git push deploy main --force-with-lease