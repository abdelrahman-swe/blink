name: Sync to Deploy Remote

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - shell: bash
        env:
          TOKEN: ${{ secrets.DEPLOY_REPO_PAT }}
        run: |
          git remote add deploy "https://${TOKEN}@github.com/abdelrahman-swe/blink.git"
          git push --force-with-lease deploy main