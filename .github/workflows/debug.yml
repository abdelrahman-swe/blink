name: Sync to Deploy Remote

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Debug - Check token
        run: |
          echo "Token exists: ${{ secrets.DEPLOY_REPO_PAT != '' }}"
          echo "Token length: ${{ secrets.DEPLOY_REPO_PAT }} has length ${#TOKEN}"
        env:
          TOKEN: ${{ secrets.DEPLOY_REPO_PAT }}
          
      - name: Push to deploy repo
        run: |
          # Build URL with token
          TOKEN="${{ secrets.DEPLOY_REPO_PAT }}"
          REPO_URL="https://${TOKEN}@github.com/abdelrahman-swe/blink.git"
          
          echo "Adding remote (URL hidden)..."
          git remote add deploy "${REPO_URL}"
          
          echo "Pushing to deploy..."
          git push deploy main --force-with-lease