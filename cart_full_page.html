<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--color-background-tertiary);min-height:100vh}
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap');
.page{max-width:900px;margin:0 auto;padding:24px 16px;display:grid;grid-template-columns:1fr 320px;gap:20px;align-items:start}
@media(max-width:680px){.page{grid-template-columns:1fr}}
.section-title{font-size:13px;font-weight:600;color:var(--color-text-tertiary);letter-spacing:.06em;text-transform:uppercase;margin-bottom:12px}
.cart-panel{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:16px;padding:20px}
.page-heading{font-size:22px;font-weight:600;color:var(--color-text-primary);margin-bottom:4px}
.page-sub{font-size:13px;color:var(--color-text-secondary);margin-bottom:20px}
.cart-item{display:flex;gap:14px;align-items:flex-start;padding:16px 0;border-bottom:0.5px solid var(--color-border-tertiary)}
.cart-item:last-child{border-bottom:none;padding-bottom:0}
.item-img{width:88px;height:88px;border-radius:10px;object-fit:cover;flex-shrink:0;border:0.5px solid var(--color-border-tertiary)}
.item-body{flex:1;min-width:0}
.item-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.item-name{font-size:14px;font-weight:500;color:var(--color-text-primary);line-height:1.4}
.del-btn{background:none;border:none;cursor:pointer;color:var(--color-text-tertiary);padding:2px;flex-shrink:0;display:flex;align-items:center;justify-content:center;border-radius:6px;width:26px;height:26px;transition:background .15s,color .15s}
.del-btn:hover{background:var(--color-background-danger);color:var(--color-text-danger)}
.item-price-simple{margin-top:8px;display:flex;align-items:baseline;gap:8px}
.price-main{font-size:15px;font-weight:600;color:var(--color-text-primary)}
.price-old{font-size:12px;color:var(--color-text-tertiary);text-decoration:line-through}
.badge-discount{font-size:10px;font-weight:600;background:var(--color-background-success);color:var(--color-text-success);padding:2px 6px;border-radius:20px}
.item-footer{display:flex;justify-content:space-between;align-items:center;margin-top:10px}

/* merged entries */
.entries-box{background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:10px;padding:10px 12px;margin-top:10px;display:flex;flex-direction:column;gap:0}
.entry-row{display:flex;align-items:center;gap:8px;padding:7px 0}
.entry-row+.entry-row{border-top:0.5px solid var(--color-border-tertiary)}
.badge{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;white-space:nowrap;letter-spacing:.03em;text-transform:uppercase;flex-shrink:0}
.badge-deal{background:#EEEDFE;color:#3C3489}
.badge-reg{background:var(--color-background-tertiary);color:var(--color-text-secondary);border:0.5px solid var(--color-border-tertiary)}
.entry-price-wrap{flex:1;display:flex;align-items:baseline;gap:6px}
.e-price{font-size:13px;font-weight:600}
.e-price-deal{color:#534AB7}
.e-price-reg{color:var(--color-text-primary)}
.e-old{font-size:11px;color:var(--color-text-tertiary);text-decoration:line-through}
.e-pct{font-size:10px;font-weight:600;background:#EAF3DE;color:#3B6D11;padding:1px 5px;border-radius:20px;white-space:nowrap}
.e-qty{font-size:11px;color:var(--color-text-tertiary);flex-shrink:0;tabular-nums}
.merged-footer{display:flex;justify-content:space-between;align-items:center;margin-top:10px}

/* qty control */
.qty{display:inline-flex;align-items:center;border:0.5px solid var(--color-border-secondary);border-radius:8px;overflow:hidden}
.qty-btn{background:none;border:none;width:30px;height:30px;cursor:pointer;font-size:15px;color:var(--color-text-primary);display:flex;align-items:center;justify-content:center;transition:background .15s}
.qty-btn:hover{background:var(--color-background-secondary)}
.qty-val{font-size:13px;font-weight:500;width:30px;text-align:center;color:var(--color-text-primary);border-left:0.5px solid var(--color-border-tertiary);border-right:0.5px solid var(--color-border-tertiary)}

/* summary */
.summary-panel{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:16px;padding:20px;position:sticky;top:20px}
.summary-row{display:flex;justify-content:space-between;font-size:13px;color:var(--color-text-secondary);margin-bottom:10px}
.summary-row span:last-child{color:var(--color-text-primary);font-weight:500}
.summary-divider{height:0.5px;background:var(--color-border-tertiary);margin:14px 0}
.summary-total{display:flex;justify-content:space-between;font-size:16px;font-weight:600;color:var(--color-text-primary);margin-bottom:16px}
.checkout-btn{width:100%;background:#1a1a1a;color:#fff;border:none;border-radius:10px;padding:13px;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:opacity .15s}
.checkout-btn:hover{opacity:.88}
.promo-wrap{margin-top:12px;display:flex;gap:8px}
.promo-input{flex:1;border:0.5px solid var(--color-border-secondary);border-radius:8px;padding:8px 12px;font-size:13px;background:var(--color-background-primary);color:var(--color-text-primary);outline:none}
.promo-input:focus{border-color:var(--color-border-primary)}
.promo-btn{border:0.5px solid var(--color-border-secondary);background:none;border-radius:8px;padding:8px 12px;font-size:13px;cursor:pointer;color:var(--color-text-primary);white-space:nowrap;transition:background .15s}
.promo-btn:hover{background:var(--color-background-secondary)}
.tag-icon{width:10px;height:10px;display:inline-block;vertical-align:middle}
</style>

<div class="page">
  <div>
    <p class="page-heading">Your cart</p>
    <p class="page-sub">3 items · 2 products</p>

    <div class="cart-panel">

      <!-- ── Regular single-entry item ── -->
      <div class="cart-item">
        <img class="item-img" src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=176&h=176&fit=crop" alt="Headphones">
        <div class="item-body">
          <div class="item-top">
            <span class="item-name">Bose QuietComfort 45</span>
            <button class="del-btn">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
            </button>
          </div>
          <div class="item-price-simple">
            <span class="price-main">12,500 EGP</span>
            <span class="price-old">14,000 EGP</span>
            <span class="badge-discount">-11%</span>
          </div>
          <div class="item-footer">
            <span style="font-size:11px;color:var(--color-text-tertiary)">In stock</span>
            <div class="qty">
              <button class="qty-btn" onclick="adj('q1',-1,1,10)">−</button>
              <span class="qty-val" id="q1">2</span>
              <button class="qty-btn" onclick="adj('q1',1,1,10)">+</button>
            </div>
          </div>
        </div>
      </div>

      <!-- ── Merged item: deal + regular entries ── -->
      <div class="cart-item">
        <img class="item-img" src="https://images.unsplash.com/photo-1618366712010-f4ae9c647dcb?w=176&h=176&fit=crop" alt="Sony WH-1000XM5">
        <div class="item-body">
          <div class="item-top">
            <span class="item-name">Sony WH-1000XM5 Headphones</span>
            <button class="del-btn">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
            </button>
          </div>

          <!-- price breakdown -->
          <div class="entries-box">
            <div class="entry-row">
              <span class="badge badge-deal">
                <svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
                Deal
              </span>
              <div class="entry-price-wrap">
                <span class="e-price e-price-deal">19,000 EGP</span>
                <span class="e-old">19,500 EGP</span>
                <span class="e-pct">-3%</span>
              </div>
              <span class="e-qty">×25</span>
            </div>
            <div class="entry-row">
              <span class="badge badge-reg">Regular</span>
              <div class="entry-price-wrap">
                <span class="e-price e-price-reg">19,200 EGP</span>
                <span class="e-old">19,500 EGP</span>
                <span class="e-pct">-2%</span>
              </div>
              <span class="e-qty">×5</span>
            </div>
          </div>

          <div class="merged-footer">
            <span style="font-size:11px;color:var(--color-text-tertiary)">30 units total</span>
            <div class="qty">
              <button class="qty-btn" onclick="adj('q2',-1,1,30)">−</button>
              <span class="qty-val" id="q2">30</span>
              <button class="qty-btn" onclick="adj('q2',1,1,30)">+</button>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- ── Order summary ── -->
  <div class="summary-panel">
    <p class="section-title">Order summary</p>

    <div class="summary-row"><span>Subtotal</span><span>596,000 EGP</span></div>
    <div class="summary-row"><span>Shipping</span><span>Free</span></div>
    <div class="summary-row">
      <span>Deal savings</span>
      <span style="color:var(--color-text-success)">-12,500 EGP</span>
    </div>

    <div class="summary-divider"></div>
    <div class="summary-total"><span>Total</span><span>583,500 EGP</span></div>

    <button class="checkout-btn">
      Checkout
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    </button>

    <div class="promo-wrap">
      <input class="promo-input" type="text" placeholder="Promo code">
      <button class="promo-btn">Apply</button>
    </div>
  </div>
</div>

<script>
function adj(id, d, min, max) {
  const el = document.getElementById(id);
  let v = parseInt(el.textContent) + d;
  el.textContent = Math.max(min, Math.min(max, v));
}
</script>
